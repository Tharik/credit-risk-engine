name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: |
          dotnet restore src/CreditRiskEngine.Api/CreditRiskEngine.Api.csproj
          dotnet restore tests/CreditRiskEngine.UnitTests/CreditRiskEngine.UnitTests.csproj
          dotnet restore tests/CreditRiskEngine.IntegrationTests/CreditRiskEngine.IntegrationTests.csproj

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Build Docker image
        run: docker build -t credit-risk-engine:ci .